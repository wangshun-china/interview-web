name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
  ALIYUN_USERNAME: aliyun4384550071
  ALIYUN_PASSWORD: wangshun817
  FRONTEND_IMAGE: wangshun_build/wangshun_portfolio
  LOG_SERVER_IMAGE: wangshun_build/wangshun_log_server

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        working-directory: ./resume
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./resume
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Log Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.log-server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOG_SERVER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          mkdir -p wangshun-portfolio/logs
          cd wangshun-portfolio

          cat > docker-compose.yml << 'EOF'
          services:
            portfolio:
              image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
              container_name: wangshun-portfolio
              restart: always
              ports:
                - "80:80"
              volumes:
                - ./logs:/var/log/nginx
              networks:
                - app-network

            log-server:
              image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_log_server:latest
              container_name: wangshun-log-server
              restart: always
              volumes:
                - ./logs:/var/log/nginx:ro
              ports:
                - "3001:3000"
              environment:
                - LOG_FILE=/var/log/nginx/access.log
              depends_on:
                - portfolio
              networks:
                - app-network

          networks:
            app-network:
              driver: bridge
          EOF

          docker login crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com -u aliyun4384550071 -p wangshun817
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
