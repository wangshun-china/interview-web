name: Deploy Portfolio

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies & Build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
          username: aliyun4384550071
          password: "wangshun817"

      - name: Build and Push Docker Images
        working-directory: resume
        run: |
          # Build and push frontend
          IMAGE_TAG=crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

          # Build and push log-server
          LOG_SERVER_IMAGE_TAG=crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_log_server:latest
          cd ..
          docker build -f Dockerfile.log-server -t $LOG_SERVER_IMAGE_TAG .
          docker push $LOG_SERVER_IMAGE_TAG

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            echo "Deploying Portfolio..."
            mkdir -p /home/ubuntu/wangshun-portfolio
            cd /home/ubuntu/wangshun-portfolio

            # 写入完整的 docker-compose.yml（包含 log-server）
            cat << 'EOF' > docker-compose.yml
            services:
              portfolio:
                image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
                container_name: wangshun-portfolio
                restart: always
                ports:
                  - "80:80"
                volumes:
                  - ./logs:/var/log/nginx
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
                networks:
                  - app-network

              log-server:
                image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_log_server:latest
                container_name: wangshun-log-server
                restart: always
                volumes:
                  - ./logs:/var/log/nginx:ro
                ports:
                  - "3001:3000"
                environment:
                  - LOG_FILE=/var/log/nginx/access.log
                depends_on:
                  - portfolio
                networks:
                  - app-network

            networks:
              app-network:
                driver: bridge
            EOF

            # 创建日志目录
            mkdir -p logs

            # 硬编码登录阿里云 (保证拉取权限)
            sudo docker login crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com -u aliyun4384550071 -p wangshun817
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker image prune -f
            echo "Portfolio deployed successfully!"
