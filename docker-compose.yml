services:
  portfolio:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
    container_name: wangshun-portfolio
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  log-server:
    build:
      context: .
      dockerfile: Dockerfile.log-server
    container_name: wangshun-log-server
    restart: always
    volumes:
      - ./logs:/var/log/nginx:ro
    ports:
      - "3001:3000"
    environment:
      - LOG_FILE=/var/log/nginx/access.log
    depends_on:
      - portfolio
    networks:
      - app-network

networks:
  app-network:
    driver: bridge